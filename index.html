<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista Simples</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    
    <header class="header">
      <h1>Minhas Listas</h1>
    </header>

    <!-- Input de novo item -->
    <section class="input-section">
      <input 
        type="text" 
        id="item-input" 
        placeholder="Adicionar item..." 
        autocomplete="off"
      />
      <button id="add-btn">+</button>
    </section>

    <!-- Lista atual -->
    <section class="list-section">
      <ul id="item-list"></ul>
    </section>

    <!-- Ações da lista -->
    <section class="actions">
      <button id="save-list-btn">Salvar Lista</button>
    </section>

    <!-- Listas salvas -->
    <section class="saved-lists">
      <h2>Listas Salvas</h2>
      <ul id="saved-lists"></ul>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
